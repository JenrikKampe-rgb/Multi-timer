<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Timer Pro</title>
    <style>
        body { background: #000; color: #fff; font-family: -apple-system, sans-serif; text-align: center; margin: 0; padding: 0; }
        #login, #app { padding: 20px; box-sizing: border-box; width: 100%; }
        
        /* STATUS LEISTE */
        .status-bar { background: #00ff88; color: #000; padding: 15px; font-weight: bold; font-size: 18px; margin-bottom: 15px; border-radius: 0 0 15px 15px; }

        /* EINGABEFELDER */
        input { padding: 15px; font-size: 18px; border-radius: 10px; border: 1px solid #444; background: #222; color: #fff; width: 90%; margin-bottom: 10px; -webkit-appearance: none; }
        .search-field { border-color: #666; background: #111; font-size: 16px; }

        /* TIMER BOXEN */
        .timer-box { border: 2px solid #00ff88; margin: 15px 0; padding: 12px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; background: #111; }
        .paused { border-color: #ff9800 !important; opacity: 0.5; }
        
        .controls { display: flex; align-items: center; }
        .btn { font-size: 30px; padding: 5px 12px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
        .del { color: #ff4444; }
    </style>
</head>
<body>

    <div id="login">
        <h1 style="margin-top:60px">🔐 Gesperrt</h1>
        <input type="password" id="pw" placeholder="Passwort..." oninput="check()">
    </div>

    <div id="app" style="display:none">
        <div class="status-bar" id="stat">Anzahl Timer: 0</div>
        <h2 style="color:#00ff88">⏱ Multi-Timer</h2>
        
        <input type="number" id="inp" placeholder="Zahl + Enter" onkeypress="handleEnter(event)">
        <input type="text" id="srch" class="search-field" placeholder="🔍 Timer suchen..." oninput="draw()">
        
        <div id="list"></div>
    </div>

    <script>
        var pwStr = "38536945527";
        var timers = {};

        function check() {
            var val = document.getElementById('pw').value;
            if (val === pwStr) {
                document.getElementById('login').style.display = 'none';
                document.getElementById('app').style.display = 'block';
            }
        }

        function handleEnter(e) {
            if (e.keyCode === 13 || e.which === 13) {
                var n = document.getElementById('inp').value;
                if (n !== "") {
                    if (!timers[n]) {
                        timers[n] = { t: 0, r: true };
                    }
                    document.getElementById('inp').value = "";
                    draw();
                }
            }
        }

        function toggle(id) {
            timers[id].r = !timers[id].r;
            draw();
        }

        function remove(id) {
            delete timers[id];
            draw();
        }

        function draw() {
            var list = document.getElementById('list');
            var s = document.getElementById('srch').value.toLowerCase();
            var html = "";
            var count = 0;

            for (var id in timers) {
                count++;
                if (s !== "" && id.indexOf(s) === -1) continue;

                var isR = timers[id].r;
                var style = isR ? "" : "paused";
                var icon = isR ? "⏸️" : "▶️";

                html += '<div class="timer-box ' + style + '">' +
                    '<div style="text-align:left"><b>#' + id + '</b><br>' +
                    '<span id="v-' + id + '" style="font-size:26px; font-family:monospace; color:#00ff88; font-weight:bold">' + fmt(timers[id].t) + '</span></div>' +
                    '<div class="controls">' +
                    '<div class="btn" onclick="toggle(\'' + id + '\')">' + icon + '</div>' +
                    '<div class="btn del" onclick="remove(\'' + id + '\')">❌</div>' +
                    '</div></div>';
            }
            list.innerHTML = html;
            document.getElementById('stat').innerHTML = "Anzahl Timer: " + count;
        }

        function fmt(ms) {
            var s = Math.floor(ms/1000), h = Math.floor(s/3600), m = Math.floor((s%3600)/60);
            var hStr = h < 10 ? "0" + h : h;
            var mStr = m < 10 ? "0" + m : m;
            var sStr = (s%60) < 10 ? "0" + (s%60) : (s%60);
            return hStr + ":" + mStr + ":" + sStr;
        }

        setInterval(function() {
            for (var id in timers) {
                if (timers[id].r) {
                    timers[id].t += 1000;
                    var el = document.getElementById('v-' + id);
                    if (el) el.innerHTML = fmt(timers[id].t);
                }
            }
        }, 1000);
    </script>
</body>
</html>
